<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fashion Hub — Contact</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <div class="brand-logo rounded-circle d-flex align-items-center justify-content-center">F</div>
        <div><strong>Fashion Hub</strong></div>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>

        <a href="cart.html" class="btn btn-outline-primary ms-3 position-relative">
          <i class="bi bi-bag-fill"></i>
          <span id="cartCountContact" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <h1>Contact Us</h1>
      <div class="row g-4 mt-3">
        <div class="col-md-6">
          <h5>Get in touch</h5>
          <p class="small">
            Email: <a href="mailto:fashionhub@gmail.com">fashionhub@gmail.com</a><br>
            Phone: +88017xxxxxxx<br>
            Address: Mirpur, Dhaka, Bangladesh          </p>

          <h6 class="mt-4">Business Hours</h6>
          <p class="small">Sun–Fri: 9:00 AM – 6:00 PM</p>

          <!-- Google map placeholder -->
          <div class="bg-light border rounded p-4 mt-3 text-center" style="min-height:200px;">
            <i class="bi bi-map me-2"></i> Google Map Placeholder
          </div>
        </div>

        <div class="col-md-6">
          <h5>Send us a message</h5>
          <form id="contactForm" onsubmit="return false;">
            <div class="mb-3">
              <label for="contactName" class="form-label">Your Name</label>
              <input id="contactName" type="text" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="contactEmail" class="form-label">Email</label>
              <input id="contactEmail" type="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="contactMessage" class="form-label">Message</label>
              <textarea id="contactMessage" rows="5" class="form-control" required></textarea>
            </div>
            <button id="contactSendBtn" class="btn btn-primary">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-4 bg-dark text-white">
    <div class="container text-center small">
      &copy; 2026 Sazzad. All rights reserved.
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
