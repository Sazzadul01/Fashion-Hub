<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fashion Hub — Shop</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <div class="brand-logo rounded-circle d-flex align-items-center justify-content-center">F</div>
        <div><strong>Fashion Hub</strong></div>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>

        <form class="d-none d-lg-flex ms-3" id="navSearchForm2" onsubmit="return false;">
          <div class="input-group">
            <input id="navSearchInput2" class="form-control" type="search" placeholder="Search products...">
            <button class="btn btn-outline-secondary" id="navSearchBtn2" type="button"><i class="bi bi-search"></i></button>
          </div>
        </form>

        <a href="cart.html" class="btn btn-outline-primary ms-3 position-relative">
          <i class="bi bi-bag-fill"></i>
          <span id="cartCountShop" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Shop Controls -->
  <section class="py-4">
    <div class="container">
      <div class="row g-3 align-items-center">
        <div class="col-md-3">
          <select id="categoryFilter" class="form-select">
            <option value="">All Categories</option>
            <option>Jersey</option>
            <option>Chiffon</option>
            <option>Silk</option>
            <option>Instant</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="sortSelect" class="form-select">
            <option value="default">Sort by</option>
            <option value="price-asc">Price: low to high</option>
            <option value="price-desc">Price: high to low</option>
          </select>
        </div>
        <div class="col-md-4">
          <form class="d-flex" id="shopSearchForm" onsubmit="return false;">
            <input id="shopSearchInput" class="form-control" placeholder="Search products by name...">
            <button id="shopSearchBtn" class="btn btn-outline-secondary ms-2"><i class="bi bi-search"></i></button>
          </form>
        </div>
        <div class="col-md-2 text-md-end">
          <small class="text-muted">Showing <span id="productCount">0</span> products</small>
        </div>
      </div>
    </div>
  </section>

  <!-- Product Grid -->
  <section class="py-4">
    <div class="container">
      <div id="productsGrid" class="row g-3">
        <!-- Product cards injected by script.js -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="py-4 bg-dark text-white">
    <div class="container text-center small">
      &copy; 2026 Sazzad. All rights reserved.
    </div>
  </footer>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="js/script.js"></script>
  <script>
    // Prefill category filter from URL if provided
    (function() {
      const params = new URLSearchParams(location.search);
      const category = params.get('category');
      if (category) {
        document.getElementById('categoryFilter').value = category;
      }
    })();
  </script>
</body>
</html>
